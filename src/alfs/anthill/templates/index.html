<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anthill Conductor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #1a1a1a; color: #ddd; padding: 20px; }
  h1 { font-size: 1.2rem; margin-bottom: 16px; color: #fff; }

  .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  button {
    padding: 6px 14px; border: 1px solid #555; border-radius: 3px;
    background: #2a2a2a; color: #ddd; cursor: pointer; font-family: monospace;
    font-size: 0.9rem;
  }
  button:hover:not(:disabled) { background: #3a3a3a; border-color: #888; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.primary { border-color: #4a9; color: #4a9; }
  button.primary:hover:not(:disabled) { background: #1a3a30; }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th {
    text-align: left; padding: 6px 10px; border-bottom: 1px solid #333;
    color: #888; font-weight: normal;
  }
  td { padding: 6px 10px; border-bottom: 1px solid #222; vertical-align: top; }
  tr.task-row { cursor: pointer; }
  tr.task-row:hover td { background: #222; }

  .status-pending  { color: #888; }
  .status-running  { color: #fa0; }
  .status-done     { color: #4a9; }
  .status-failed   { color: #e44; }

  .log-row td { padding: 0; }
  .log-box {
    background: #111; border-top: 1px solid #333;
    padding: 10px; max-height: 400px; overflow-y: auto;
  }
  .log-box pre { white-space: pre-wrap; word-break: break-all; font-size: 0.8rem; line-height: 1.4; }
  .log-empty { color: #555; font-style: italic; }

  .expand-hint { color: #555; font-size: 0.75rem; margin-left: 4px; }

  .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .top-bar h1 { margin-bottom: 0; }
  button.yolo { border-color: #555; color: #888; }
  button.yolo.active { border-color: #fa0; color: #fa0; background: #2a2000; }
  button.yolo.active:hover { background: #3a2f00; }
  button.cc { border-color: #555; color: #888; }
  button.cc.active { border-color: #4af; color: #4af; background: #0a1a2a; }
  button.cc.active:hover { background: #102030; }
</style>
</head>
<body>
<div class="top-bar">
  <h1>Anthill Conductor</h1>
  <button class="yolo" id="yolo-btn" onclick="toggleYolo()" title="When idle, auto-queue a random action">YOLO</button>
  <button class="cc" id="cc-btn" onclick="toggleCC()" title="Generate CC task files instead of calling LLM">CC</button>
</div>

<div class="actions" id="action-buttons"></div>

<table id="task-table">
  <thead>
    <tr>
      <th>Type</th>
      <th>Status</th>
      <th>Queued</th>
      <th>Duration</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="task-body">
    <tr><td colspan="5" style="color:#555; padding:12px 10px;">No tasks yet.</td></tr>
  </tbody>
</table>

<script>
const expandedIds = new Set();
const logOffsets = {};
const logPollers = {};

let yoloMode = false;
let ccMode = false;
let loadedActions = [];

const YOLO_WEIGHTS = { update: 10, morph_redirect: 2 };

function toggleYolo() {
  yoloMode = !yoloMode;
  const btn = document.getElementById('yolo-btn');
  btn.classList.toggle('active', yoloMode);
}

function toggleCC() {
  ccMode = !ccMode;
  document.getElementById('cc-btn').classList.toggle('active', ccMode);
  updateActionButtons();
}

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString();
}

function fmtSecs(s) {
  if (s < 60) return s + 's';
  return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
}

function fmtDuration(task) {
  const start = task.started_at ? new Date(task.started_at) : null;
  const end = task.ended_at ? new Date(task.ended_at) : null;
  const est = task.est_duration != null ? Math.round(task.est_duration) : null;

  if (task.status === 'pending') {
    return est != null ? '~' + fmtSecs(est) : '—';
  }
  if (!start) return '—';
  const elapsed = Math.floor(((end || new Date()) - start) / 1000);
  const elapsedStr = fmtSecs(elapsed);
  if (task.status === 'running' && est != null) {
    return elapsedStr + ' / ~' + fmtSecs(est);
  }
  return elapsedStr;
}

function statusClass(s) { return 'status-' + s; }

function renderTasks(tasks) {
  const tbody = document.getElementById('task-body');
  if (tasks.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:#555; padding:12px 10px;">No tasks yet.</td></tr>';
    return;
  }

  // Render newest first
  const reversed = [...tasks].reverse();
  let html = '';
  for (const t of reversed) {
    const expanded = expandedIds.has(t.id);
    const hint = expanded ? '▲' : '▼';
    const removeBtn = t.status === 'pending'
      ? `<button onclick="event.stopPropagation(); removeTask('${t.id}')" style="padding:2px 7px; font-size:0.8rem;" title="Remove from queue">×</button>`
      : '';
    html += `<tr class="task-row" onclick="toggleExpand('${t.id}')" data-id="${t.id}">
      <td>${t.type}${t.use_cc ? ' <span style="color:#4af;font-size:0.8em">[CC]</span>' : ''}</td>
      <td class="${statusClass(t.status)}">${t.status}</td>
      <td>${fmtTime(t.created_at)}</td>
      <td>${fmtDuration(t)}</td>
      <td>${removeBtn}<span class="expand-hint">${hint}</span></td>
    </tr>`;
    if (expanded) {
      logOffsets[t.id] = 0;  // force re-fetch from start after DOM rebuild
      html += `<tr class="log-row" id="log-row-${t.id}">
        <td colspan="5">
          <div class="log-box">
            <pre id="log-pre-${t.id}"><span class="log-empty">Loading…</span></pre>
          </div>
        </td>
      </tr>`;
    }
  }
  tbody.innerHTML = html;

  // Restart log polling for expanded tasks
  for (const id of expandedIds) {
    ensureLogPoller(id);
  }
}

let lastTasks = [];

async function refreshTasks() {
  try {
    const r = await fetch('/api/tasks');
    const tasks = await r.json();
    lastTasks = tasks;
    renderTasks(tasks);
    if (yoloMode) maybeYolo(tasks);
  } catch (e) {
    // network hiccup — ignore
  }
}

function maybeYolo(tasks) {
  const busy = tasks.some(t => t.status === 'pending' || t.status === 'running');
  if (busy) return;
  if (loadedActions.length === 0) return;
  const eligible = ccMode ? loadedActions.filter(a => a.cc_ready) : loadedActions;
  if (eligible.length === 0) return;
  const weights = eligible.map(a => YOLO_WEIGHTS[a.name] ?? 1);
  const total = weights.reduce((s, w) => s + w, 0);
  let r = Math.random() * total;
  let pick = eligible[eligible.length - 1];
  for (let i = 0; i < eligible.length; i++) {
    r -= weights[i];
    if (r <= 0) { pick = eligible[i]; break; }
  }
  console.log('[YOLO] queue idle — auto-queuing', pick.name);
  queueTask(pick.name);
}

function toggleExpand(id) {
  if (expandedIds.has(id)) {
    expandedIds.delete(id);
    stopLogPoller(id);
  } else {
    expandedIds.add(id);
    if (!logOffsets[id]) logOffsets[id] = 0;
  }
  renderTasks(lastTasks);
}

function ensureLogPoller(id) {
  fetchLogs(id);  // always fetch immediately after render
  if (!logPollers[id]) {
    logPollers[id] = setInterval(() => fetchLogs(id), 2000);
  }
}

function stopLogPoller(id) {
  if (logPollers[id]) {
    clearInterval(logPollers[id]);
    delete logPollers[id];
  }
}

async function fetchLogs(id) {
  if (!expandedIds.has(id)) { stopLogPoller(id); return; }
  const offset = logOffsets[id] || 0;
  try {
    const r = await fetch(`/api/tasks/${id}/logs?from=${offset}`);
    const data = await r.json();
    const pre = document.getElementById('log-pre-' + id);
    if (!pre) { stopLogPoller(id); return; }
    if (data.lines && data.lines.length > 0) {
      if (offset === 0) pre.textContent = '';
      pre.textContent += data.lines.join('\n') + '\n';
      logOffsets[id] = data.total;
      // auto-scroll
      const box = pre.closest('.log-box');
      if (box) box.scrollTop = box.scrollHeight;
    } else if (offset === 0) {
      pre.innerHTML = '<span class="log-empty">No output yet.</span>';
    }
  } catch (e) {
    // ignore
  }
}

async function removeTask(id) {
  await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
  refreshTasks();
}

async function queueTask(type) {
  try {
    await fetch('/api/tasks', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({type, cc: ccMode}),
    });
    refreshTasks();
  } catch (e) {
    alert('Failed to queue task: ' + e);
  }
}

function updateActionButtons() {
  const container = document.getElementById('action-buttons');
  for (const btn of container.querySelectorAll('button')) {
    const ccReady = btn.dataset.ccReady === 'true';
    btn.disabled = ccMode && !ccReady;
  }
}

async function loadActions() {
  try {
    const r = await fetch('/api/actions');
    const actions = await r.json();
    loadedActions = actions;
    const container = document.getElementById('action-buttons');
    for (const a of actions) {
      const btn = document.createElement('button');
      btn.className = 'primary';
      btn.dataset.ccReady = String(a.cc_ready);
      btn.onclick = () => queueTask(a.name);
      btn.textContent = 'Queue ' + a.label;
      container.appendChild(btn);
    }
  } catch (e) {
    // ignore
  }
}

// Initial load + polling
loadActions();
refreshTasks();
setInterval(refreshTasks, 5000);
</script>
</body>
</html>
